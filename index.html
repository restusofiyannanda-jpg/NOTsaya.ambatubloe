<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Legend Final</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="overlay">
<h1>🔥 TETRIS NYENI</h1>
<button onclick="startGame(); startMusic();">
START
</button>
</div>

<div id="gameOver" class="overlay hidden">
<h1>GAME OVER</h1>
<p id="finalScore"></p>
<h2 id="newHigh" style="color:gold; display:none;">🏆 NEW HIGH SCORE!</h2>
<button onclick="startGame()">MAIN LAGI</button>
</div>

<div class="hud">
  <div class="hud-box">
    <span class="label">SCORE</span>
    <span id="score" class="value">0</span>
  </div>

  <div class="hud-box">
    <span class="label">LEVEL</span>
    <span id="level" class="value">1</span>
  </div>

  <div class="hud-box">
    <span class="label">HIGH SCORE</span>
    <span id="highScore" class="value">0</span>
  </div>
</div>
<canvas id="game" width="240" height="400"></canvas>

<div class="controls">
    <button onclick="move(-1)">⬅️</button>
    <button onclick="rotate()">🔄</button>
    <button onclick="drop()">⬇️</button>
    <button onclick="move(1)">➡️</button>
</div>

<script src="script.js"></script>

</body>
</html>
